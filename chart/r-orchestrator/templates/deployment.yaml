apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "r-orchestrator.fullname" . }}
  labels:
    {{- include "r-orchestrator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "r-orchestrator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "r-orchestrator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "r-orchestrator.fullname" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: "{{ .Values.image.orchestrator.repository }}:{{ .Values.image.orchestrator.tag }}"
          imagePullPolicy: {{ .Values.image.orchestrator.pullPolicy }}
          env:
            # --- Server ---
            - name: SERVER_HTTP_ADDR
              value: {{ .Values.server.httpAddr | quote }}
            - name: SERVER_GRPC_ADDR
              value: {{ .Values.server.grpcAddr | quote }}
            - name: SERVER_GRPC_PUBLIC_ADDR
              value: {{ .Values.server.grpcPublicAddr | default (include "r-orchestrator.grpcPublicAddr" .) | quote }}
            - name: SERVER_PUBLIC_URL
              value: {{ .Values.server.publicURL | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.server.logLevel | quote }}
            # --- Database ---
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret.name | default "postgres" }}
                  key: {{ .Values.database.existingSecret.hostKey | default "R_ORCHESTRATOR_POSTGRES_HOST" }}
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret.name | default "postgres" }}
                  key: {{ .Values.database.existingSecret.portKey | default "R_ORCHESTRATOR_POSTGRES_PORT" }}
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret.name | default "postgres" }}
                  key: {{ .Values.database.existingSecret.dbKey | default "R_ORCHESTRATOR_POSTGRES_DB" }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret.name | default "postgres" }}
                  key: {{ .Values.database.existingSecret.usernameKey | default "R_ORCHESTRATOR_POSTGRES_USERNAME" }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret.name | default "postgres" }}
                  key: {{ .Values.database.existingSecret.passwordKey | default "R_ORCHESTRATOR_POSTGRES_PASSWORD" }}
            # --- Cluster ---
            - name: CLUSTER_AGENT_TOKEN
              value: {{ .Values.cluster.agentToken | default (randAlphaNum 16) | quote }}
            - name: CLUSTER_AGENT_IMAGE
              value: {{ .Values.cluster.agentImage | default (printf "%s:%s" .Values.image.agent.repository .Values.image.agent.tag) | quote }}
            - name: CLUSTER_AGENT_LOG_LEVEL
              value: {{ .Values.cluster.agentLogLevel | quote }}
            - name: CLUSTER_BILLING_CYCLE_SECONDS
              value: {{ .Values.cluster.billingCycleSeconds | quote }}
            - name: CLUSTER_BILLING_ADVANCE_SECONDS
              value: {{ .Values.cluster.billingAdvanceSeconds | quote }}
            # --- Cluster.Kubernetes ---
            - name: CLUSTER_KUBERNETES_NAMESPACE
              value: {{ .Values.cluster.kubernetes.namespace | quote }}
            - name: CLUSTER_KUBERNETES_IMAGE_PULL_SECRETS
              value: {{ .Values.cluster.kubernetes.imagePullSecrets | default .Values.image.pullSecrets | toJson | quote }}
            - name: CLUSTER_KUBERNETES_KUBECONFIG_PATH
              value: {{ .Values.cluster.kubernetes.kubeConfigPath | quote }}
            # --- OSS ---
            - name: ALIYUN_OSS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oss.secretName }}
                  key: {{ .Values.oss.endpointKey }}
            - name: ALIYUN_OSS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oss.secretName }}
                  key: {{ .Values.oss.accessKeyKey }}
            - name: ALIYUN_OSS_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oss.secretName }}
                  key: {{ .Values.oss.accessSecretKey }}
            - name: ALIYUN_OSS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oss.secretName }}
                  key: {{ .Values.oss.bucketKey }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
