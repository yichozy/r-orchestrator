syntax = "proto3";

package rorchestrator.control.v1;

option go_package = "github.com/yichozy/r-orchestrator/proto/controlv1";

service ControlService {
  rpc OpenControlStream(stream AgentMessage) returns (stream ServerMessage);
}

message AgentMessage {
  oneof payload {
    Register register = 1;
    Heartbeat heartbeat = 2;
    ShardAccepted shard_accepted = 3;
    ShardStarted shard_started = 4;
    ShardFailed shard_failed = 5;
    ShardResultReady shard_result_ready = 6;
  }
}

message ServerMessage {
  oneof payload {
    AssignShard assign_shard = 1;
    Drain drain = 2;
    Shutdown shutdown = 3;
    CancelShard cancel_shard = 4;
    ShardResultStored shard_result_stored = 5;
  }
}

message Register {
  string agent_id = 1;
  string tenant_id = 2;
  string backend_name = 3;
  string token = 4;
  string version = 5;
}

message Heartbeat {
  string agent_id = 1;
  string status = 2;
  string current_shard_id = 3;
}

message AssignShard {
  string shard_id = 1;
  string task_id = 2;
  string script_name = 3;
  string bundle_download_url = 4;
  string output_upload_url = 5;
  string output_oss_key = 6;
  int32 total_shards = 7;
}

message Drain {}
message Shutdown {}
message CancelShard { string shard_id = 1; }
message ShardAccepted { string shard_id = 1; }
message ShardStarted { string shard_id = 1; }
message ShardFailed { string shard_id = 1; string error_message = 2; }
message ShardResultReady {
  string shard_id = 1;
  string output_oss_key = 2;
  string sha256 = 3;
}
message ShardResultStored { string shard_id = 1; }
